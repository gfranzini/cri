<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Primo Soccorso</title>

<style>

*{box-sizing:border-box;}

body{
font-family:system-ui;
background:linear-gradient(135deg,#e8f0ff,#f7f9ff);
margin:0;
padding:16px;
display:flex;
justify-content:center;
}

.container{max-width:900px;width:100%;}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
width:100%;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#3a7afe;
color:white;
cursor:pointer;
margin:6px 4px;
font-size:15px;
font-weight:600;
}

.secondary{background:#b41818;}
.skip{background:#f39c12;}
.filterBtn{background:#6c7a89;}

.option{
padding:14px;
border:1px solid #ddd;
border-radius:10px;
margin:8px 0;
cursor:pointer;
}

.option:hover{background:#eef3ff;}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.hidden{display:none;}

.progressContainer{
width:100%;
height:14px;
background:#e5e5e5;
border-radius:8px;
overflow:hidden;
margin-top:12px;
}

#progressBar{
height:100%;
width:0%;
background:#27ae60;
transition:width 0.3s;
}

.correctFlash{animation:correctAnim 0.6s;}
.wrongFlash{animation:wrongAnim 0.6s;}

@keyframes correctAnim{
0%{background:white;}
40%{background:#b8f5c2;}
100%{background:white;}
}

@keyframes wrongAnim{
0%{background:white;}
40%{background:#ffb0b0;}
100%{background:white;}
}

</style>
</head>

<body>

<div class="container">

<div class="card" id="card">

<h2>🚑 Quiz Primo Soccorso</h2>

<div>

<button onclick="setMode('quiz')">Quiz</button>
<button onclick="setMode('case')">Casi clinici</button>
<button class="filterBtn" onclick="setFilter('acro')">Solo acronimi</button>
<button class="filterBtn" onclick="setFilter('num')">Solo valori</button>
<button class="filterBtn" onclick="setFilter('errors')">Solo errori</button>

</div>

<hr>

<div id="question"></div>

<div id="answers"></div>

<input id="textAnswer" class="hidden" enterkeyhint="done">

<div id="rangeInputs" class="hidden">

<input id="rangeMin" type="number" placeholder="min">
<input id="rangeMax" type="number" placeholder="max">

</div>

<button class="secondary" onclick="showAnswer()">Mostra risposta</button>
<button class="skip" onclick="skipQuestion()">Salta</button>
<button onclick="nextQuestion()">Prossima</button>

<div id="feedback"></div>

<div class="progressContainer">
<div id="progressBar"></div>
</div>

<div id="stats"></div>

<br>

<button class="secondary" onclick="resetProgress()">Reset progressi</button>

</div>
</div>

<script src="data.js"></script>

<script>

let mode="quiz"
let filter=null

let score=0
let total=0

let current
let answered=false
let skipped=[]
let memory={}

const textAnswer=document.getElementById("textAnswer")
const rangeInputs=document.getElementById("rangeInputs")
const rangeMin=document.getElementById("rangeMin")
const rangeMax=document.getElementById("rangeMax")

function animateResult(ok){

let card=document.getElementById("card")

card.classList.remove("correctFlash","wrongFlash")

if(ok){
card.classList.add("correctFlash")
}else{
card.classList.add("wrongFlash")
}

setTimeout(()=>{

card.classList.remove("correctFlash","wrongFlash")

},600)

}

function scrollToQuiz(){

document.getElementById("card").scrollIntoView({
behavior:"smooth",
block:"start"
})

}

function autoNext(){

setTimeout(()=>{

nextQuestion()

},1200)

}

function saveProgress(){

localStorage.setItem("quizProgress",JSON.stringify({
score,total,memory
}))

}

function loadProgress(){

let s=localStorage.getItem("quizProgress")

if(s){

let p=JSON.parse(s)

score=p.score||0
total=p.total||0
memory=p.memory||{}

}

updateStats()

}

function resetProgress(){

localStorage.removeItem("quizProgress")

score=0
total=0
memory={}

updateStats()

}

function setMode(m){

mode=m
filter=null
nextQuestion()

}

function setFilter(f){

mode="quiz"
filter=f
nextQuestion()

}

function randomItem(){

if(skipped.length && Math.random()<0.3){
return skipped.shift()
}

let pool=data

if(filter==="acro") pool=data.filter(d=>d.type==="acro")
if(filter==="num") pool=data.filter(d=>d.type==="num")
if(filter==="errors") pool=data.filter(d=>memory[d.term])

if(pool.length===0) pool=data

return pool[Math.floor(Math.random()*pool.length)]

}

function updateStats(){

stats.innerHTML="Punteggio: "+score+" / "+total

let percent=total?score/total*100:0
progressBar.style.width=percent+"%"

}

function nextQuestion(){

answered=false

answers.innerHTML=""
feedback.innerHTML=""

textAnswer.value=""
rangeMin.value=""
rangeMax.value=""

textAnswer.classList.add("hidden")
rangeInputs.classList.add("hidden")

current=randomItem()

scrollToQuiz()

if(current.type==="acro"){

question.innerHTML="Significato di <b>"+current.term+"</b>"
textAnswer.classList.remove("hidden")
textAnswer.focus()

return
}

if(current.type==="num"){

question.innerHTML="Valore: <b>"+current.term+"</b>"

if(current.rule==="range"){
rangeInputs.classList.remove("hidden")
rangeMin.focus()
}else{
textAnswer.classList.remove("hidden")
textAnswer.focus()
}

return
}

question.innerHTML="Cosa significa <b>"+current.term+"</b>?"

let options=[current.def]

let defs=data.filter(d=>d.def).map(d=>d.def)

while(options.length<4){

let r=defs[Math.floor(Math.random()*defs.length)]
if(!options.includes(r)) options.push(r)

}

options.sort(()=>Math.random()-0.5)

options.forEach(o=>{

let div=document.createElement("div")
div.className="option"
div.innerText=o
div.onclick=()=>checkMulti(o)

answers.appendChild(div)

})

}

function checkMulti(ans){

if(answered) return
answered=true

let ok=ans===current.def

animateResult(ok)

if(ok){score++;memory[current.term]=0}
else{memory[current.term]=1}

total++

updateStats()
saveProgress()
autoNext()

}

function checkText(){

if(answered) return
answered=true

let user=textAnswer.value.trim().toLowerCase()
let correct=current.def.toLowerCase()

let ok=user===correct

animateResult(ok)

if(ok){score++;memory[current.term]=0}
else{memory[current.term]=1}

total++

updateStats()
saveProgress()
autoNext()

}

textAnswer.addEventListener("keyup",e=>{

if(e.key==="Enter"){
checkText()
}

})

textAnswer.addEventListener("blur",()=>{

if(!answered && textAnswer.value.trim()){
checkText()
}

})

loadProgress()
nextQuestion()

</script>

</body>
</html>
